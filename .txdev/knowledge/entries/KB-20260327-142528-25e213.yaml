content:
  details: '


    CAVEAT: discover_kernels() uses bare `except Exception: continue` in its

    module scan loop. Broken kernel imports are silently skipped with no warning.

    After any namespace rename or import refactor, verify all expected kernels

    are discovered by comparing --collect-only counts or importing each module

    individually. A decreased test count with 0 failures is the telltale sign.'
  summary: Auto-discover kernel modules via KERNEL_META attribute + pkgutil.iter_modules,
    enabling a single thin test wrapper and unified bench CLI.
