content:
  details: 'The pipeline.py MBarrier.arrive() method was changed to default cta_id=None,
    pred=None

    (local arrive) for "simplicity". This worked fine for single-CTA kernels but caused
    deadlocks

    in multi-CTA cluster kernels (CTA_GROUP=2) like deepgemm and fp8_blockwise_gemm.


    Root cause: local arrive (mbarrier.arrive.shared.b64) only signals the calling
    CTA''s own

    barrier, but multi-CTA kernels need all CTAs to signal CTA 0''s barrier via remote
    arrive

    (mbarrier.arrive.shared::cluster.b64).


    Prevention: when changing defaults for PTX primitives that have different semantics
    depending

    on cluster configuration, always test with both single-CTA and multi-CTA kernels
    before

    committing. The lower_tirx pass handles the optimization from remote to local
    automatically.

    '
  summary: Changing the default cta_id/pred parameters for MBarrier.arrive() from
    remote to local arrive caused deadlocks in CTA_GROUP>1 kernels that were not caught
    until test_deepgemm hung.
