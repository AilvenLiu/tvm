content:
  details: 'The user had to ask "Did you run it?" after the agent described how the test

    infrastructure would work without actually executing any tests. Several kernel

    tests had subtle bugs (wrong dtype, non-contiguous tensors, incorrect tolerance)

    that would only surface by actually running them.


    Lesson: For any test infrastructure change, always run the actual tests and

    show concrete output (pass count, fail count, timing) before claiming the

    migration is complete. "It should work" is never a substitute for "here are

    the results."

    '
  summary: Multiple times during this feature, tests were claimed to work without actually running them; always run tests
    and show output before claiming success.
