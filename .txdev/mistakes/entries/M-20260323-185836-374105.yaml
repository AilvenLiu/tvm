content:
  details: "When creating lambda factories inside a for loop:\n  for s in [1024, 4096,\
    \ 8192]:\n      def make_inputs():  # BUG: captures s by reference\n         \
    \ return prepare_data(s, s, s)\n\nAll iterations share the same s reference, so\
    \ by the time bench_tk calls\nthe factory, s is always 8192. Fix with default\
    \ argument binding:\n  def make_inputs(sz=s):  # OK: captures current value of\
    \ s\n      return prepare_data(sz, sz, sz)\n\nThis classic Python gotcha affected\
    \ the bench comparison script, causing\nsome bench_tk results to benchmark the\
    \ wrong size. Same applies to any\nlambda or nested def that references a loop\
    \ variable.\n"
  summary: Lambdas in a for loop capture loop variables by reference; use default
    args (e.g., sz=s) to capture by value.
