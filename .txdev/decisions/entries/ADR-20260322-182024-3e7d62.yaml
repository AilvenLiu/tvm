content:
  details: 'Previously, dtype constructors like Tx.float32 were plain functions generated by func_gen(). They only supported
    __call__ (FFI invocation). To add subscript support (Tx.float32[N]), we replaced them with DtypeConstructor instances
    that have both __call__ (delegates to FFI, same behavior as before) and __getitem__ (returns LocalVectorAnnotation marker).

    The parser''s visit_ann_assign checks isinstance(raw_ann, T.LocalVectorAnnotation) BEFORE the LetAnnotation check, ensuring
    vector annotations take priority. The else branch handles scalar annotations by calling the DtypeConstructor (which returns
    a Var via FFI), then creates a local_scalar.

    All shorthand aliases (f16, f32, etc.) are DtypeConstructor instances exported in __all__. The smem/tmem aliases are simple
    assignments/partial, not DtypeConstructor.

    '
  summary: DtypeConstructor class replaced func_gen plain functions to support both __call__ (FFI for scalar) and __getitem__
    (LocalVectorAnnotation for vector alloc). This enables Tx.f32() and Tx.f32[N] from the same object.
