content:
  details: 'Three CTA reduction sync patterns existed across tirx-kernels:


    1. `cta_sync()` (fused_add_rms_norm) — maps to `__syncthreads()` directly. Trivially
    equivalent.


    2. `bar.sync(1, bdx*bdy) + fence.proxy_async("shared::cta")` (activation/rmsnorm)
    — `bar.sync(1,N)` where N=all CTA threads is functionally equivalent to `bar.sync(0,N)`
    for synchronization. `fence.proxy_async` is redundant because data loading is
    synchronous (Tx.copy, not TMA). `__syncthreads()` provides a strict superset:
    both sync and full CTA memory barrier.


    3. `bar.sync(1, b_dx*b_dy) + fence.proxy("shared")` (normalization/rmsnorm) —
    SM100a kernel with TMA pipeline, but TMA completion is guarded by `input_bar.wait(0,
    0)` (mbarrier wait with acquire semantics) before the reduction starts. At reduction
    time, only synchronous smem writes occur. `__syncthreads()` orders these correctly.


    Three conditions were verified at each target site:

    - All CTA threads participate (no thread subset isolation at reduction sites)

    - No pending async proxy operations at reduction time

    - `__syncthreads()` provides sufficient memory ordering for synchronous smem read/write


    Empirical validation: all 1910 tirx tests pass, benchmarks show no regression.

    '
  summary: 'The cta_reduce intrinsic generates __syncthreads() internally, which correctly
    replaces three different sync patterns used at CTA reduction sites: cta_sync(),
    bar.sync(id,n)+fence.proxy_async, and bar.sync(id,n)+fence.proxy.'
