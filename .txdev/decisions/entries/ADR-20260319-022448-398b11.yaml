content:
  details: "Context: 35 individual test_*.py files in tests/python/tirx/kernels/cuda/sm100a/\neach contained 50-200 lines\
    \ of boilerplate for compiling and testing one kernel.\nAdding a new kernel required creating a new test file with mostly\
    \ duplicated code.\n\nDecision: Replace all 35 files with a single test_kernels.py (~45 lines) that\ncalls discover_kernels(min_compute_capability=10)\
    \ from tirx-kernels registry\nand generates pytest.mark.parametrize cases. Each test case delegates to\nrun_kernel_test()\
    \ in the kernel module.\n\nA companion conftest.py switches pytest-xdist distribution from 'loadfile' to\n'load' so -n\
    \ 16 distributes individual parametrized cases across workers.\n\nConsequences:\n  - Adding a new kernel test requires\
    \ only adding KERNEL_META + CONFIGS + run_test()\n  to the kernel module in tirx-kernels; no changes needed in tir repo\n\
    - 6100+ lines deleted, replaced by ~75 lines (test_kernels.py + conftest.py)\n- sm80, sm90a, and megakernel tests are\
    \ unaffected (they use inline kernels)\n- Test count preserved: 245 passed, 1 skipped (same as before)\n"
  summary: Replace 35 individual test files with one parametrized test_kernels.py that auto-discovers kernels via registry,
    plus conftest.py to fix xdist parallelism.
