content:
  details: 'Problem: Three independent poll loops (poll_repo, poll_kernels, poll_bench_ci)
    with no coordination. tirx-kernels updates triggered re-queuing even without new
    tir commits. bench-ci updates triggered os.execv restart from the poller. Jobs
    could start with stale dependencies.


    Decision: Poller only polls tir origin/tirx. Worker uses peek_pending() + ensure_deps_uptodate()
    + dequeue_job() pattern:

    1. peek_pending() checks if work exists without claiming it

    2. ensure_deps_uptodate() pulls tirx-kernels (fetch + ff-only + pip install -e)
    and bench-ci (fetch + ff-only + os.execv if changed)

    3. dequeue_job() claims the job only after deps are fresh


    Key guarantees:

    - Jobs never run with stale dependencies (deps updated before dequeue)

    - bench-ci restart does not lose jobs (job is still pending at restart time)

    - tirx-kernels updates no longer trigger spurious re-benchmarks

    - update-kernels.sh deleted (functionality absorbed into worker)'
  summary: Worker pulls tirx-kernels and bench-ci before each job dequeue; poller
    only enqueues new tir commits. Eliminates three independent poll loops.
