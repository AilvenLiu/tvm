content:
  details: 'The user asked to run ''tirx standard test''. Instead of checking CLAUDE.md
    for the canonical test command, I inferred the test from library entries about
    the kernel registry pattern and ran only the sm100a test_kernels.py file. The
    correct command (pytest tests/python/tirx/ -n 16) was explicitly written in CLAUDE.md
    under ''## Testing''.


    Root cause: Did not consult CLAUDE.md before acting on a project-convention question.
    Library entries described the kernel test infrastructure but not the standard
    developer workflow.


    Fix: Always check CLAUDE.md (or the relevant slash command) for canonical project
    commands before guessing from codebase knowledge. This was later addressed by
    creating /tir-test as a slash command.'
  summary: When user said 'run tirx standard test', ran only test_kernels.py (sm100a
    subset) instead of the full suite (pytest tests/python/tirx/ -n 16) documented
    in CLAUDE.md.
