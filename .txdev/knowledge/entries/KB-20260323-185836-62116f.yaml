content:
  details: 'The flashinfer nvfp4 API changed from nvfp4_batch_gemm to flashinfer.gemm.mm_fp4.

    Key requirement: B_fp4 and B_sf must be passed as .T (transpose view) for column-major

    layout. Using .T.contiguous() converts back to row-major and produces wrong results.

    The .T without .contiguous() is a zero-cost view that just changes the stride
    metadata.

    '
  summary: flashinfer.mm_fp4 (replacing nvfp4_batch_gemm) expects B in column-major
    layout -- use B.T as a view, NOT B.T.contiguous().
created: '2026-03-23'
