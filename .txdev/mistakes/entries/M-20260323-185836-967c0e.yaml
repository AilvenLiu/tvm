content:
  details: 'First implementation: max(2, ceil(L2/input) + 1) -- uses 1x L2 cache size,

    always returns at least 2 groups.


    ThunderKittens formula: 1 if input >= 3*L2 else floor(3*L2/input) + 1 --

    uses 3x L2 to guarantee reliable eviction, allows 1 group when input is

    already large enough to naturally evict.


    The 3x multiplier is deliberate in TK to ensure reliable L2 eviction even

    with associativity effects. The min-1 (not min-2) is also correct since

    if your input is already 3x the L2 cache, cycling through groups adds no

    eviction benefit.


    Always verify numerical formulas against the reference implementation

    character-by-character rather than reimplementing from description.

    '
  summary: Initial _compute_groups used 1x L2 with min 2 groups; TK uses 3x L2 and
    allows 1 group when input exceeds threshold.
