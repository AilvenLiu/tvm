content:
  details: 'The TIRX pool allocator assigns multiple logical buffers to the same physical

    shared memory region, meaning buf.data points to the same TIR Var for all

    pool-allocated buffers. Using hash(buf.data) as part of a cache key caused

    A_smem and B_smem descriptors to collide when they had identical (ldo, sdo,

    swizzle_val), resulting in the B descriptor being reused for A — pointing the

    GEMM at wrong smem addresses and producing garbage output.


    Fix: use hash(buf) which gives buffer object identity, distinguishing A_smem

    from B_smem even when they share the same .data Var.


    This pattern applies to any caching logic keyed on buffer identity in the

    presence of pool allocation.

    '
  summary: Pool-allocated shared memory buffers (e.g., A_smem, B_smem) share the same
    underlying .data Var, so hash(buf.data) collides — use hash(buf) (buffer object
    identity) for cache keys.
