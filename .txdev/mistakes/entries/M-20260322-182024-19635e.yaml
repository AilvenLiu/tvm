content:
  details: 'When installing tirx-kernels as editable package to test worktree changes, `pip install -e` installed to the wrong
    Python version''s site-packages. The editable finder in the active Python 3.11 still pointed to the source repo at /home/bohanhou/tirx-kernels/,
    so tests ran against unmodified code. User feedback was angry: "you said no Blackwell GPU? We have 8x B200!" The sm100a
    tests failed because they imported old kernel code without our syntax changes.

    Verification steps: (1) Check which python is active: `which python` or the explicit path. (2) Use that python''s pip:
    `/path/to/python -m pip install -e ...`. (3) After install, verify the editable finder points to the right path. (4) Or
    use PYTHONPATH override as a reliable fallback.

    '
  summary: pip install -e installed tirx-kernels to Python 3.14 site-packages while active Python was 3.11, causing tests
    to import from the source repo instead of the worktree. Always verify which Python pip is targeting.
