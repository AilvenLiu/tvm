content:
  details: "The DtypeConstructor class supports two paths in visit_ann_assign (parser.py):\n1. Scalar: `x: Tx.f32` — DtypeConstructor\
    \ is callable, falls to the else branch\n   (line 540), calls DtypeConstructor.__call__() -> FFI -> Var, then\n   local_scalar(dtype)\
    \ -> alloc_buffer([1], dtype) -> scalar_wrapper(buf[0]).\n   Result: x is a PrimExpr (BufferLoad wrapped in scalar_wrapper).\
    \ Access as `x` directly.\n\n2. Vector: `x: Tx.f32[N]` — DtypeConstructor.__getitem__(N) returns LocalVectorAnnotation,\n\
    \   detected at line 516, calls alloc_local(shape=(N,), dtype). Result: x is a Buffer.\n   Access as `x[i]`. Supports\
    \ .view(), Tx.max(x, ...), Tx.sum(x, ...).\n\nCritical: Tx.f32 (scalar) != Tx.f32[1] (size-1 buffer). Variables passed\
    \ to Tx.max()/Tx.sum() MUST use Tx.f32[1] because those functions expect Buffer args. Using Tx.f32 causes \"Expected ir.PrimExpr\
    \ but got tir.Buffer\" errors.\nShorthand aliases: f16=float16, f32=float32, bf16=bfloat16, i8-i64, u8-u64. Memory aliases:\
    \ Tx.smem = Tx.alloc_shared, Tx.tmem = partial(alloc_buffer, scope=\"tmem\").\nCannot convert to annotation syntax: dynamic\
    \ dtype (buf.dtype, a_type), extra kwargs (align=, name=), inside @Tx.meta_class __init__.\n"
  summary: 'x: Tx.f32 produces a scalar_wrapper(BufferLoad) PrimExpr via local_scalar(). x: Tx.f32[N] produces a Buffer via
    alloc_local([N], dtype). Both are annotation syntax parsed by visit_ann_assign, but return fundamentally different types.
    Use Tx.f32[1] (not Tx.f32) when a Buffer object is needed (e.g. for Tx.max/Tx.sum).'
