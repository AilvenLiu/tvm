content:
  details: 'Problem: The old range_sugar approach added a custom range function to
    the parser''s

    value table that returned T.serial ForFrames. This worked for for-loops but broke
    list

    comprehensions: [f(i) for i in range(N)] would get range_sugar instead of Python''s

    builtin range, producing ForFrame objects inside the comprehension.


    Decision: Intercept range() at the AST level in visit_for only. Before evaluating

    node.iter, check if it''s a doc.Call with doc.Name func id "range". If so, eval
    the

    args individually and construct T.serial(start, stop, step=step). Otherwise, fall

    through to normal eval_expr.


    Trade-offs:

    - Pro: range() in comprehensions and other non-for contexts remains Python''s
    builtin

    - Pro: Works with both Python int and PrimExpr arguments (args are eval''d individually)

    - Pro: No value-table pollution; range_sugar function can be deleted entirely

    - Con: Only intercepts simple range(N) calls, not method-call or aliased range

    - Accepted: The simple pattern covers all real usage in TVMScript kernels


    Key code: parser.py visit_for, ~lines 269-293.

    '
  summary: Handle for i in range(N) by intercepting range() at the AST level in visit_for,
    instead of shadowing Python's range in the parser value table.
