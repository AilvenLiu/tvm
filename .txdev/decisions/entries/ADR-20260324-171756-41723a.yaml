content:
  details: 'Problem: bench-run.sh captured stdout as JSON via `eval "$CMD --json"
    >$OUT_FILE`, but kernel modules print debug output to stdout (e.g. print(pool.offset)
    in batch_attention.py), mixing with JSON and causing json.load() failures.


    Decision: Add --json-file <path> to tirx_kernels.bench CLI. The registry command
    template includes a {json_file} placeholder. bench-run.sh creates a tempfile,
    substitutes the placeholder, and tirx-kernels writes JSON directly to that file.
    stdout/stderr go to the log.


    Alternatives considered:

    1. Redirect kernel print() to stderr -- rejected because it would require kernel
    authors to care about CI''s JSON channel

    2. Parse stdout to extract JSON from mixed output -- rejected as fragile

    3. Suppress kernel print() during --json mode -- rejected because debug output
    is useful


    Consequences:

    - Kernel authors can freely print() without breaking CI

    - store_results.py reads from --json-file (interface unchanged)

    - --json flag still works for backward compat (prints to stdout)

    - {json_file} placeholder in registry benchrun format enables shell-level substitution'
  summary: bench CLI writes JSON to a file (--json-file) instead of stdout, so kernel
    print() output cannot corrupt the JSON pipeline.
