content:
  details: 'CTA reduce is a 2-step algorithm: (1) intra-warp warp_reduce, (2) cross-warp
    via shared memory. This means cta_reduce''s codegen must embed the warp_reduce
    CUDA template.


    With two files (cuda_warp_reduce.py, cuda_cta_reduce.py), the op-to-code mapping
    (sum->"+= shuffled", max->"max(val, shuffled)", min->"min(val, shuffled)") and
    the warp reduce template generator would be duplicated.


    Merged into cuda_reduce.py with:

    - `_OP_TABLE = {"sum": ("val += shuffled;", "T(0)"), "max": (...), "min": (...)}`
    — shared

    - `_warp_reduce_source(func_name, width, step_expr)` — shared helper generating
    the __shfl_xor_sync butterfly loop

    - `@register_codegen("cuda_warp_reduce")` — uses _warp_reduce_source directly

    - `@register_codegen("cuda_cta_reduce")` — embeds _warp_reduce_source output in
    the 2-step CTA template


    The __init__.py import was updated from two separate imports to one: `from . import
    cuda_reduce`.

    '
  summary: Warp reduce and CTA reduce codegen share an op table (_OP_TABLE) and warp
    reduce source generator (_warp_reduce_source), so they live in one file (cuda_reduce.py)
    instead of two separate files.
