content:
  details: 'Initial implementation only slept between impls (if idx > 0: sleep).

    TK sleeps after every impl''s measurement loop, including the last one.


    The post-measurement cooldown ensures thermal state settles before the

    next impl''s warmup phase begins. Without it, the previous impl''s heat

    could affect the next impl''s warmup and measurement. The trailing sleep

    after the last impl is less critical but maintains consistency with the

    TK reference implementation.

    '
  summary: bench_tk sleeps after each impl's timed loop (not just between impls) to
    match the TK benchmarking methodology.
