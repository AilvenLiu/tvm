content:
  details: 'Previous pattern: return {"tir_ms": bench_return} where bench_return was

    the do_bench wall-clock time for the TIR kernel only.


    New pattern: return {"impls": ctx.get_impl_times()} where ctx is the

    ProtonContext that wraps all bench() calls. get_impl_times() returns

    {name: ms} for every impl profiled (tir, baselines, etc.).


    This change enables the bench-ci pipeline to consume structured JSON

    with all impl times, eliminating the need for parse_proton.py and its

    fragile KNOWN_IMPLS hardcoding. Baseline errors are captured separately

    in an "errors" dict when applicable.

    '
  summary: All 21 run_bench functions now return proton-parsed impl times dict instead
    of do_bench wall-clock, enabling structured JSON output for bench-ci.
created: '2026-03-23'
