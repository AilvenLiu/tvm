content:
  details: 'Many TIRX kernels use 2D thread blocks where threadIdx.x = lane within
    warp and threadIdx.y = warp index. In this layout, `threadIdx.x / 32 = 0` for
    ALL threads (since threadIdx.x < 32), making naive warp_id computation incorrect.


    The correct approach for generated CUDA code that needs warp_id/lane_id:

    ```cuda

    int tid = threadIdx.x + threadIdx.y * blockDim.x + threadIdx.z * blockDim.x *
    blockDim.y;

    int warp_id = tid / 32;

    int lane_id = tid % 32;

    ```


    This works correctly for 1D, 2D, and 3D block configurations. The linearized form
    is a strict generalization — for 1D blocks it reduces to `threadIdx.x` since blockDim.y
    and blockDim.z are 1.


    Symptom of the bug: all threads compute warp_id=0, so only scratch[0] is written
    in step 1 of CTA reduce, and step 2 reads uninitialized scratch[1..N-1], causing
    ~99.7% of values to be wrong.

    '
  summary: CUDA codegen that computes warp_id or lane_id must use linearized tid =
    threadIdx.x + threadIdx.y * blockDim.x + threadIdx.z * blockDim.x * blockDim.y,
    not just threadIdx.x / 32.
