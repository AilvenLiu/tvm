content:
  details: "bench_tk supports two input modes:\n1. list[tuple] -- pre-built input\
    \ groups, used as-is\n2. callable -- a factory () -> tuple that creates one input\
    \ group\n\nWhen a callable is passed, bench_tk calls _compute_groups(sample) to\
    \ determine\nhow many input groups are needed for L2 cache eviction, then calls\
    \ the factory\nthat many times. The formula matches ThunderKittens exactly:\n\
    \  num_groups = 1 if input >= 3*L2 else floor(3*L2/input) + 1\n\nThe factory pattern\
    \ is important because the funcs dict receives *inputs[i] as\npositional args.\
    \ If funcs are closures capturing their own data (lambda: fn()),\npassing [()]\
    \ bypasses L2 eviction entirely (only 1 group). Instead, funcs should\naccept\
    \ the tensor args and the factory should produce fresh tensors each call.\n\n\
    Example auto-computed num_groups on B200 (L2=128MB):\n- 1024x1024 bf16 GEMM: 65\
    \ groups\n- 4096x4096 bf16 GEMM: 5 groups\n- 8192x8192 bf16 GEMM: 1 group (input\
    \ exceeds 3*L2)\n"
  summary: bench_tk accepts a callable factory that auto-computes num_groups for L2
    eviction via _compute_groups, matching the ThunderKittens formula.
