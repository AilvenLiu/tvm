content:
  details: 'The smem descriptor cache in gemm_async.py used a key derived from

    hash(smem_buf.data) + (ldo, sdo, swizzle_val). Pool-allocated buffers

    A_smem and B_smem shared the same .data Var (pointing to the same

    physical shared memory region). When A and B had identical encode

    parameters, the cache returned B''s descriptor for A.


    This caused the fp8_blockwise_gemm kernel to produce cosine similarity

    of -0.001 (completely wrong output). The bug was subtle because:

    - It only manifested with pool allocation (not separate smem allocs)

    - It required both buffers to have matching encode parameters

    - Unit tests with distinct shapes didn''t trigger it


    Fix: hash(smem_buf) instead of hash(smem_buf.data). Buffer object

    identity is unique even when .data is shared.


    Lesson: when caching by buffer identity, always use the buffer object

    itself, never just .data, because pool allocation aliases .data.

    '
  summary: Used hash(smem_buf.data) for smem descriptor cache keys, but pool-allocated
    buffers share the same .data Var — caused GEMM to reuse B's descriptor for A,
    producing garbage output.
