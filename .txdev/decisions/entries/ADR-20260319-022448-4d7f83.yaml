content:
  details: 'Context: Some kernels like ep_dispatch_combine require multi-GPU nvshmem
    setup

    that isn''t available in standard test environments. Others like fused_moe depend

    on JIT-compiled libraries that may be on read-only filesystems.


    Decision: The thin test wrapper only runs kernels that have non-empty CONFIGS.

    Kernels that can''t run in standard environments set CONFIGS = [] to opt out.

    Within run_test(), kernels can also call pytest.skip() for runtime conditions

    (e.g., read-only flashinfer data directory).


    This keeps the registry complete (all kernels are discoverable) while allowing

    graceful opt-out from automated testing without special-casing in the test

    framework.


    Consequences:

    - No hardcoded skip lists in test_kernels.py

    - Each kernel module is responsible for its own skip conditions

    - bench-ci can still list all kernels via registry even if some aren''t testable

    '
  summary: Each kernel module owns its run_test() implementation; kernels requiring
    special environments (multi-GPU, nvshmem) set CONFIGS=[] to opt out of automated
    testing.
  created: '2026-03-19'
  id: ADR-20260319-022448-4d7f83
  scope:
    - repo
  tags:
    - testing
    - architecture
    - kernel
    - design-pattern
  title: Delegate-to-module pattern for run_test with CONFIGS=[] for env-dependent kernels
  updated: '2026-03-19'
