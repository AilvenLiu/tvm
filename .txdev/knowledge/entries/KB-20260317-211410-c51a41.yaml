content:
  details: 'In pipeline.py, MBarrier.arrive() generates different PTX depending on whether cta_id/pred are None:

    - cta_id=None, pred=None -> mbarrier.arrive.shared.b64 (LOCAL arrive, only the calling CTA''s barrier)

    - cta_id=0, pred=True -> mbarrier.arrive.shared::cluster.b64 (REMOTE arrive, targets CTA 0''s barrier)


    For CTA_GROUP=2 kernels (e.g. hgemm with 2-CTA clusters), all CTAs must arrive on CTA 0''s barrier.

    Using local arrive causes CTA 1 to arrive on its own barrier (which nobody waits on), while CTA 0''s

    barrier never gets enough arrivals -> deadlock.


    The fix was to restore the default to cta_id=0, pred=True (remote arrive). The lower_tirx pass

    (lower_tirx_scope_ids.cc) optimizes away the remote overhead for single-CTA cases by checking

    if cta_id and pred are actually needed.

    '
  summary: MBarrier.arrive() with cta_id=None uses local arrive (mbarrier.arrive.shared.b64); with cta_id=0 uses remote arrive
    (mbarrier.arrive.shared::cluster.b64). Multi-CTA kernels (CTA_GROUP>1) require remote arrive to avoid deadlocks.
