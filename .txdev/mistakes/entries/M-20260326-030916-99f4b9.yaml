content:
  details: 'The initial codegen generated:

    ```cuda

    int warp_id = threadIdx.x / 32;

    int lane_id = threadIdx.x % 32;

    ```


    For a kernel with blockDim=(32, 8, 1), all 256 threads had warp_id=0. Step 1 of
    CTA reduce (`if (lane_id == 0) scratch[warp_id] = val`) wrote ALL partial sums
    to scratch[0], losing 7 of 8 warp results. Step 2 read scratch[1..7] which contained
    uninitialized values.


    Symptom: reduction result was ~1/8 of expected for sum, and completely wrong for
    max/min.


    Fix: linearized thread ID. This should be the default pattern for any generated
    CUDA code that needs warp-level indexing, since TIRX kernels frequently use multi-dimensional
    thread blocks.

    '
  summary: Initial CTA reduce codegen used `threadIdx.x / 32` for warp_id. TIRX kernels
    commonly use 2D blocks (threadIdx.x=lane, threadIdx.y=warp), where this gives
    warp_id=0 for all threads, producing ~99.7% wrong values.
