content:
  details: "The proton vs bench_tk gap is consistently observed across all kernel\
    \ types:\n- For single-kernel impls (TIR kernels), the gap is small (~10-20%)\n\
    - For multi-kernel baselines (deepgemm, flashinfer), the gap is much larger\n\
    \  at small sizes (e.g., deepgemm fp8 1024: proton=0.005ms, bench_tk=0.036ms)\n\
    \  because proton only captures the slowest depth-2 child kernel, missing\n  auxiliary\
    \ kernels (scatter, fill, transpose_and_pack, etc.)\n- At large sizes (8192+),\
    \ the gap narrows proportionally since the main\n  kernel dominates total runtime\n\
    \nBoth methods are highly stable across trials (proton stdev ~0, bench_tk stdev\
    \ < 0.01ms).\nbench_tk also adds post-measurement cooldown sleep matching the\
    \ TK pattern.\n"
  summary: Proton reports the slowest single GPU kernel time per impl; bench_tk reports
    end-to-end wall-clock including all sub-kernels and host overhead.
