content:
  details: "Extended the original scalar-only annotation (x: Tx.int32 -> local_scalar) with:\n1. Vector/tensor annotation:\
    \ x: Tx.f32[N] or x: Tx.f32[M,N] -> alloc_local(shape, dtype)\n   returning a Buffer. Implemented via DtypeConstructor.__getitem__\
    \ -> LocalVectorAnnotation,\n   detected in visit_ann_assign before the LetAnnotation check.\n\n2. Shorthand dtype aliases:\
    \ f16, f32, f64, bf16, i8-i64, u8-u64 as DtypeConstructor instances.\n3. Memory allocation aliases: Tx.smem = Tx.alloc_shared,\
    \ Tx.tmem = partial(alloc_buffer, scope=\"tmem\").\nUnconvertible cases (retained as explicit calls): - Dynamic dtype:\
    \ Tx.alloc_local([N], buf.dtype) or Tx.alloc_local((N,), a_type) - Extra kwargs: align=0, align=16, name=\"state_o\" -\
    \ @Tx.meta_class __init__: not parsed by TVMScript - alloc_buffer with scope=\"local\" and align= kwargs\nMigration scope:\
    \ ~200 call sites across 36+ kernel files in tirx-kernels. Test results: 1855 passed, 0 failed, 0 regressions. Zero perf\
    \ degradation on GEMM benchmarks.\n"
  summary: 'Type annotation syntax replaces alloc_local in prim_func bodies: Tx.f32 for scalar, Tx.f32[N] for vector/tensor
    Buffer. Tx.smem replaces alloc_shared, Tx.tmem for tmem scope. Retained: alloc_local with dynamic dtype/align/name kwargs,
    alloc_local in meta_class __init__.'
