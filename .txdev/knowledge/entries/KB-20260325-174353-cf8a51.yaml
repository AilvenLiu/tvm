content:
  details: "When dispatch code writes to a Map (e.g., shared_state via SharedStateSet\
    \ FFI),\nthe underlying TVM Map creates a new object due to COW semantics. The\
    \ caller\nholding the original reference still sees the old map. This caused a\
    \ bug where\nTIRxOpDispatcher::shared_state_ was stale after each dispatch call.\n\
    \nFix pattern: after calling Python dispatch that may mutate the map, read\nthe\
    \ map back from the context object into the C++ field:\n  shared_state_ = ctx->shared_state;\n\
    \nThis applies to any TVM container (Map, Array) passed across FFI boundaries\n\
    where the callee may modify it.\n"
  summary: TVM's Map<K,V> uses copy-on-write — Set() returns a new map, so C++/Python
    callers holding a reference to the old map won't see changes unless they re-read
    the updated map.
