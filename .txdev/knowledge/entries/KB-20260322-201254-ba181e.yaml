content:
  details: Eight test files previously used sys.path.insert(0, os.path.join(os.environ.get('TIRX_KERNELS_PATH',
    '~/tirx-kernels/kernels'), 'megakernel')) to import modules like layer, moe, lm_head,
    static_fused_layer, gemm_search_config, and moe_full_layer. These are now imported
    as from tirx_kernels.megakernel.<module> import ... since tirx-kernels is a pip-installable
    package. The TIRX_KERNELS_PATH and TIRX_KERNELS_DIR env vars are fully deprecated
    across all three repos (tir, tirx-kernels, tirx-bench-ci).
  summary: All megakernel test files under tests/python/tirx/kernels/cuda/megakernel/
    and sm100a/ now import from tirx_kernels.megakernel.* directly — no sys.path hacks
    or TIRX_KERNELS_PATH env var usage remains.
