content:
  details: 'Problem: After commit 680edb2bb6 enabled list comprehension evaluation
    via the

    ExprEvaluator ListComp early-exit, bare assignments like b_los = [f(i) for i in
    range(N)]

    would flow into bind_assign_value''s list branch, which created orphan T.local_scalar

    buffers for each element -- dead IR that wasted compile time and could cause subtle
    bugs.


    Decision: Replace the list/tuple branch in bind_assign_value (~line 144) with

    self.report_error() that tells the user to use T.meta_var([...]) for Python-level

    values, or pass inline as *[...].


    Why not silently wrap in meta_var: Making it explicit forces the user to choose

    between meta_var (Python-level list, no IR footprint) and inline unpacking (elements

    become separate IR expressions). The old silent behavior created IR nodes the
    user

    didn''t intend.


    Note: T.meta_var([...]) is checked before the list/tuple branch (line ~140), so
    it

    still works. Tuple destructuring (a, b = func()) goes through _eval_assign before

    bind_assign_value, so it''s unaffected. T.grid multi-dimensional loops where a
    single

    variable receives a tuple of iterators also go through bind_for_value, not

    bind_assign_value, so they''re unaffected.

    '
  summary: Bare list/tuple variable assignment (var = [comp]) is now a parse error
    in TVMScript; users must use T.meta_var([...]) or inline *[...].
created: '2026-03-26'
