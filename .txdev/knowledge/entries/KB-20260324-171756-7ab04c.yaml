content:
  details: "When adding baseline benchmarks to kernel run_bench() functions:\n1. tirx-kernels:\
    \ Add baseline inside the ProtonContext block using\n   bench(..., proton_name=\"\
    <name>\"), wrapped in try/except\n2. No bench-ci changes needed -- KNOWN_IMPLS\
    \ and parse_proton.py are deprecated\n\nThe baseline pattern:\n- Must run inside\
    \ the same ProtonContext block as tir\n- Must use bench() with a unique proton_name\
    \ (appears as depth-1 in Proton tree)\n- Must be wrapped in try/except so missing\
    \ deps don't break tir benchmarking\n- Should print BASELINE_ERROR to stderr on\
    \ failure\n- Return format: {impls: ctx.get_impl_times()} (all impl names auto-discovered)\n\
    \nJSON results are written to a file via --json-file, not stdout.\nKernel print()\
    \ output goes to stdout/log and cannot corrupt JSON.\n"
  summary: 'Adding baselines to run_bench() in tirx-kernels no longer requires any
    changes in bench-ci. Structured JSON output with {impls: ctx.get_impl_times()}
    is self-describing.'
