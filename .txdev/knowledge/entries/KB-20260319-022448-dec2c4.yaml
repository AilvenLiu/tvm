content:
  details: 'pytest-xdist distributes tests across workers using a distribution strategy.

    The default ''loadfile'' strategy sends all tests from the same file to one worker,

    which is fine when tests are spread across many files. When consolidating 35 test

    files into a single test_kernels.py with ~247 parametrized cases, ''loadfile'' causes

    all cases to run on one worker, defeating -n 16 parallelism entirely.


    Fix: add a conftest.py that overrides the distribution strategy to ''load'', which

    distributes individual test cases round-robin across workers. The hook

    pytest_configure(config) checks for xdist and sets config.option.dist = "load"

    only when the current strategy would serialize (None, "no", or "loadfile").


    File: tests/python/tirx/kernels/cuda/sm100a/conftest.py

    '
  summary: When consolidating many test files into one parametrized file, pytest-xdist's default 'loadfile' strategy serializes
    all tests on one worker; switch to 'load' via conftest.py.
