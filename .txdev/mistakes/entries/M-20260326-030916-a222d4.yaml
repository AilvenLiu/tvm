content:
  details: "The initial cta_reduce codegen generated:\n```cuda\ntemplate <typename\
    \ T>\nT cta_reduce_sum(T val, T* scratch) { ... }\n```\n\nThis fails at CUDA compilation\
    \ because the pool allocator's shared memory is declared as `extern __shared__\
    \ uchar smem[];` and the sub-buffer pointer has type `unsigned char*` at the call\
    \ site. Template argument deduction sees `(float, unsigned char*)` and cannot\
    \ reconcile T.\n\nFix: Accept `void*` and cast inside:\n```cuda\ntemplate <typename\
    \ T>\nT cta_reduce_sum(T val, void* scratch_raw) {\n    T* scratch = reinterpret_cast<T*>(scratch_raw);\n\
    \    ...\n}\n```\n\nThis pattern applies to any codegen that takes a buffer pointer\
    \ from pool-allocated shared memory as a function argument.\n"
  summary: 'CTA reduce codegen used typed `T* scratch` parameter, but pool allocator
    produces `extern __shared__ uchar[]`. CUDA template deduction failed because T
    couldn''t be deduced from (float, unsigned char[]). Fix: use `void* scratch_raw`
    with `T* scratch = reinterpret_cast<T*>(scratch_raw)`.'
