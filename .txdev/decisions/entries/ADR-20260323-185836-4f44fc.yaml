content:
  details: "bench() was simplified to proton-only profiling (do_bench wall-clock removed).\n\
    bench_tk() was added as a separate function for ThunderKittens-style benchmarking.\n\
    \nThe two serve different purposes:\n- bench() + ProtonContext: profiles individual\
    \ GPU kernels, identifies which\n  sub-kernel is slowest, captures proton tree\
    \ for debugging. Used in run_bench()\n  for the bench-ci pipeline.\n- bench_tk():\
    \ measures end-to-end wall-clock with CUDA events, L2 eviction,\n  thermal cooldown.\
    \ Better for comparing total execution cost including\n  multi-kernel overhead\
    \ and host launch latency.\n\ndo_bench was removed from bench() because bench_tk\
    \ provides strictly better\nwall-clock measurement (CUDA events vs Python timing,\
    \ L2 eviction, cooldown).\nKeeping do_bench would be redundant and confusing.\n"
  summary: bench_tk provides end-to-end CUDA event timing with L2 eviction; proton
    bench provides per-kernel GPU profiling. Both coexist.
created: '2026-03-23'
id: ADR-20260323-185836-4f44fc
