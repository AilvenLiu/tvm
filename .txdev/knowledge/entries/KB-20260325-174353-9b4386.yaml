content:
  details: "The 4 cp_async.bulk.tensor ops had signatures like:\n  def g2c(dim, dst_ptr,\
    \ bar, tensormap, *coords, cta_mask=0, cta_group=1, cache_hint=\"\")\n\nThe TVMScript\
    \ printer emits all args positionally (no keyword syntax). On\nre-parse, *coords\
    \ swallows all remaining positional args including what were\noriginally cta_mask,\
    \ cta_group, and cache_hint.\n\nFix: move *coords to the end of the signature:\n\
    \  def g2c(dim, dst_ptr, bar, tensormap, cta_mask, cta_group, cache_hint, *coords)\n\
    \nThis makes all fixed params positional-first, so the generic printer naturally\n\
    round-trips without needing special-case handling or a reparse workaround.\n\n\
    When designing new intrinsics with variadic args, always put *args last.\n"
  summary: If a Python intrinsic has *args before keyword args, the positional printer
    will emit all args positionally, and re-parsing will have *args swallow the trailing
    keyword args.
created: '2026-03-25'
