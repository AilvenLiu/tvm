content:
  details: 'TVMScript''s scalar buffer shorthand prints BufferLoad(buf, [0]) as just
    the

    buffer variable name (dropping the [0] index). When the context requires a

    PrimExpr (e.g., allocated_addr parameter of DeclBuffer), this causes a

    type mismatch: the parser resolves the bare variable name to a Buffer object,

    not a PrimExpr.


    The fix in the printer is to bypass the scalar shorthand by using GetVarDoc

    to get the variable name and manually constructing var[idx] as an IndexDoc.

    This produces e.g., `tmem_addr_1[0]` instead of `tmem_addr_1`.


    Additionally, for tmem-scope DeclBuffer, the data Var is auto-created by the

    parser, so the printer must suppress the `data=` kwarg to avoid a parse error.

    The well-formedness verifier also needs an EnterDef(Buffer) override to

    auto-define the buffer''s data Var for tmem scope.

    '
  summary: Shape [1] buffers use scalar shorthand (bare name, no [0] index) in TVMScript.
    The parser resolves the bare name to a Buffer object, not a PrimExpr — so printer
    must use explicit var[idx] when PrimExpr is needed.
