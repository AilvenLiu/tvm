content:
  details: 'When updating ~20 call sites for the cp_async.bulk.tensor arg reorder,

    agents were given the task of updating test files. The agents inferred

    default values from context but got them wrong:

    - cta_group=0 instead of 1 (the old keyword default)

    - cache_hint=0 (int) instead of "" (string)


    This required a manual review pass to fix all the incorrect values.


    Lesson: when delegating mechanical code changes to agents, always

    specify the exact values to use in the prompt. Don''t rely on agents

    to look up correct defaults from function signatures.

    '
  summary: Delegated test call site updates to agents without specifying exact default
    values — agents used cta_group=0 and cache_hint=0 instead of correct cta_group=1
    and cache_hint="".
