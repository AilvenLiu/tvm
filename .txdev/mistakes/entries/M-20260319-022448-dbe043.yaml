content:
  details: 'The initial implementation replaced 35 individual test_*.py files with a single

    test_kernels.py containing all ~247 parametrized cases. This was functionally

    correct but broke the existing -n 16 parallelism because pytest-xdist''s default

    loadfile strategy sends all tests from one file to one worker.


    The user noticed immediately: "test changed to test_kernels can''t parallelize

    anymore, only runs one at a time, figure it out."


    Fix was a conftest.py that switches distribution to ''load''. This should have

    been anticipated at design time -- when consolidating many files into one,

    always consider the impact on parallel test distribution.

    '
  summary: Consolidating 35 test files into one without considering pytest-xdist's loadfile distribution broke parallelism;
    tests serialized on one worker instead of distributing across 16.
