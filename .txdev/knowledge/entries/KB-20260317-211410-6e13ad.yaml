content:
  details: "Both produce a local scalar buffer via T.local_scalar(dtype=..., name=None). The annotation\nsyntax is parsed\
    \ in visit_ann_assign (parser/tir/parser.py:548). Equivalences:\n- phase = Tx.local_scalar(\"int32\") <=> phase: Tx.int32\n\
    - wid = Tx.local_scalar(\"int32\", \"wid\") <=> wid: Tx.int32 (auto-named from variable)\n\nCannot replace in these cases:\n\
    1. Inside @Tx.meta_class __init__: runs as regular Python, not TVMScript-parsed.\n   self.x: Tx.int32 is just a Python\
    \ type hint (no-op), not an IR builder call.\n2. Dynamic names: Tx.local_scalar(\"uint64\", name=prefix + \"sdesc\") —\
    \ annotation syntax\n   cannot accept computed names.\n"
  summary: 'var: Tx.int32 annotation and Tx.local_scalar(''int32'') produce identical IR, but annotations only work inside
    TVMScript-parsed code (not in @Tx.meta_class __init__) and don''t support custom names.'
