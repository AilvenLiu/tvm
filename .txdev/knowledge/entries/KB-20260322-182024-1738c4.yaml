content:
  details: 'When using the new vector annotation syntax `v: Tx.float32[8]`, ruff''s static analysis sees that `v` is annotated
    but never assigned (no `= ...` on the RHS), so subsequent uses like `Tx.evaluate(v[0])` get flagged as F821 "undefined
    name". The fix is adding `# noqa: F821` to the lines that reference the annotated variable. This is the same pattern as
    F841 for TVMScript scope declarations but with a different error code.

    '
  summary: 'TVMScript vector annotation like `v: Tx.f32[8]` followed by `v[0]` triggers ruff F821 (undefined name) because
    ruff does not understand TVMScript''s visit_ann_assign binding. Add `# noqa: F821` to the usage line.'
