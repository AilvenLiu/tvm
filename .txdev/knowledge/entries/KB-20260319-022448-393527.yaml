content:
  details: "The bench-ci pipeline works as follows:\n1. bench-run.sh calls `python -m tirx_kernels.registry --format=benchrun\
    \ --cc 10` to\n   get KERNEL|SIZE|COMMAND lines\n2. Each COMMAND is `python -m tirx_kernels.bench --kernel <name> --config\
    \ <label>`\n3. tirx_kernels.bench starts a Proton session, runs the kernel with proton profiling,\n   then calls proton-viewer\
    \ to produce a tree output\n4. parse_proton.py reads the tree output (depth-1 = impl name, depth-2 = kernel\n   time,\
    \ take slowest child per impl), extracts {impl: avg_time_ms}\n5. Results are inserted into SQLite for the dashboard\n\n\
    Key details:\n- Proton scopes in the bench output must use known impl names matching KNOWN_IMPLS\n  in parse_proton.py\
    \ (tirx-bench-ci repo), or the tirx_soln_* prefix which gets\n  normalized to \"tir\".\n- When adding new baselines to\
    \ run_bench(), the proton_name must also be added to\n  KNOWN_IMPLS in parse_proton.py, otherwise the baseline is silently\
    \ dropped by the\n  parser and never reaches the dashboard.\n- The bench() utility wraps kernels in proton.scope(proton_name)\
    \ which creates\n  depth-1 nodes. ProtonContext manages the session but its name does NOT appear\n  in the tree output.\n\
    - L2 flush kernels (vectorized_elementwise_kernel) appear at depth-2 but are\n  skipped by parse_proton.py (it takes the\
    \ slowest depth-2 child, which is the\n  actual compute kernel).\n- Dashboard speedup = baseline_time / tir_time. Green\
    \ if >1.01, red if <0.99.\n"
  summary: 'tirx_kernels.bench uses Proton profiler to produce tree output that parse_proton.py consumes; the pipeline is:
    registry discovery -> bench CLI -> proton-viewer tree -> parse_proton.py -> SQLite.'
