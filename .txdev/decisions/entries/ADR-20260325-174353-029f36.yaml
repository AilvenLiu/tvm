content:
  details: "The original signatures had *coords before keyword args:\n  g2c(dim, dst_ptr,\
    \ bar, tensormap, *coords, cta_mask=0, cta_group=1, cache_hint=\"\")\n\nThis was\
    \ a latent round-trip bug: the TVMScript printer emits all args\npositionally,\
    \ and on re-parse *coords would swallow the trailing fixed args.\nThe bug was\
    \ masked because tests never round-tripped through TVMScript.\n\nDecision: reorder\
    \ to put *coords last:\n  g2c(dim, dst_ptr, bar, tensormap, cta_mask, cta_group,\
    \ cache_hint, *coords)\n\nTrade-off considered:\n- Breaking change: all call sites\
    \ must pass cta_mask/cta_group/cache_hint\n  explicitly (no more keyword defaults)\n\
    - Benefit: generic positional printer works naturally, no special-case\n  handling\
    \ needed, round-trip tests pass without reparse workaround\n\nThe explicit-args\
    \ requirement is actually beneficial — it makes the\nmulticast/cache_hint behavior\
    \ visible at every call site instead of\nhidden behind defaults.\n"
  summary: All 4 cp_async.bulk.tensor intrinsic signatures place *coords as the last
    parameter, after all fixed keyword args, to ensure the TVMScript positional printer
    round-trips correctly.
