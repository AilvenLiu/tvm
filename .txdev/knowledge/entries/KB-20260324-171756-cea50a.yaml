content:
  details: 'The bench-ci pipeline now works as follows:

    1. bench-run.sh calls `python -m tirx_kernels.registry --format=benchrun --cc
    10` to get KERNEL|SIZE|COMMAND lines

    2. Each COMMAND includes `--json-file {json_file}` placeholder

    3. bench-run.sh creates a tempfile, substitutes {json_file} in the command template

    4. tirx_kernels.bench runs the kernel and writes JSON results directly to the
    file

    5. All stdout/stderr goes to the log file (kernel print() output cannot corrupt
    JSON)

    6. store_results.py reads the JSON file and inserts impl times into SQLite


    Key changes from old pipeline:

    - No more stdout capture for JSON (was: eval "$CMD --json" >$OUT_FILE)

    - No more parse_proton.py / KNOWN_IMPLS coupling

    - run_bench() returns {impls: ctx.get_impl_times()} with all baseline times

    - Adding a new baseline requires zero changes in bench-ci


    Worker architecture: poller only polls tir commits. Worker calls

    ensure_deps_uptodate() before each dequeue to pull tirx-kernels

    and bench-ci to latest. bench-ci self-updates via os.execv restart.

    '
  summary: 'bench-ci pipeline: registry -> bench CLI (--json-file writes to tempfile)
    -> store_results.py reads file -> SQLite. JSON no longer goes through stdout.'
