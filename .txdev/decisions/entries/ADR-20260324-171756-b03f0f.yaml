content:
  details: 'Problem: Build/test/bench instructions in CLAUDE.md were not reliably
    followed. The agent forgot the exact test command (pytest tests/python/tirx/ -n
    16) and ran only a subset instead.


    Decision: Create .claude/commands/tir-build.md, tir-test.md, tir-bench.md as slash
    commands. CLAUDE.md now references the commands instead of inlining the instructions.


    Why this works better: CLAUDE.md is loaded at conversation start and can be pushed
    out of attention by context compression. Slash commands are injected into the
    current turn when invoked (/tir-test), so the instructions appear at the strongest
    attention position.


    Trade-off: Requires user to explicitly invoke the command rather than relying
    on the agent to follow CLAUDE.md. But for standard operations that must be done
    correctly, this is the right trade-off.'
  summary: Standard operations (build, test, bench) moved from CLAUDE.md inline instructions
    to .claude/commands/ slash commands for reliability.
