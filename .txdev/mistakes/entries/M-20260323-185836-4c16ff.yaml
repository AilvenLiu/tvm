content:
  details: 'When bench_tk funcs are closures that capture their own data (e.g.,

    lambda: ex(A, B, C)), the natural instinct is to pass [()] as inputs

    so func(*()) calls with no args. This creates exactly 1 input group,

    completely bypassing L2 cache eviction.


    The correct approach is to make funcs accept tensor args as positional

    parameters, and pass a callable factory that creates fresh tensors.

    bench_tk then auto-computes num_groups via _compute_groups and calls

    the factory that many times.


    Wrong:  bench_tk({"tir": lambda: ex(A, B, C)}, [()])

    Right:  bench_tk({"tir": lambda a, b, c: ex(a, b, c)}, make_inputs)


    The user caught this immediately -- "did you let it choose num_groups?"

    '
  summary: Passing [()] as inputs to bench_tk means only 1 group with empty args --
    no L2 cache eviction happens, defeating the purpose of TK-style benchmarking.
