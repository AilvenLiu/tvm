content:
  details: 'maps.py (CUDA 54 lines, TRN 64 lines) was a pure routing layer that called

    register_unary_binary_schedule() to bind op names to schedule candidates from unary.py

    and binary.py. It contained zero unique logic — every schedule implementation lived in

    the target modules already.


    Decision: delete maps.py and move the registration calls to the bottom of unary.py and

    binary.py respectively. This reduces indirection without changing any runtime behavior.


    MapOpType enum was kept as-is (not renamed to ElementwiseOpType) to minimize diff size.

    It remains used in 60+ places as the op table key and can be renamed in a follow-up.


    Test files were split accordingly: test_maps.py → test_unary.py + test_binary.py,

    and test_maps_trn.py → test_unary_trn.py + test_binary_trn.py. Cast tests were

    grouped with unary since cast is a unary operation.

    '
  summary: Eliminated the maps.py pure-dispatcher module by inlining its registration calls directly into unary.py and binary.py
    for both CUDA and TRN targets.
